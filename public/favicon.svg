<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="colombiaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD116" />
      <stop offset="50%" stop-color="#003087" />
      <stop offset="100%" stop-color="#C8102E" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shield/Rounded Card -->
  <rect width="116" height="116" x="6" y="6" rx="28" fill="#070a13" stroke="url(#colombiaGrad)" stroke-width="4" />
  
  <!-- Ballot Box -->
  <path d="M34 60h60v36H34z" fill="none" stroke="#FCD116" stroke-width="5" stroke-linejoin="round" />
  <!-- Slot -->
  <path d="M44 60h40" stroke="#003087" stroke-width="5" stroke-linecap="round" />
  
  <!-- Voting Ballot Paper entering slot -->
  <rect x="48" y="32" width="32" height="24" rx="3" fill="#f8fafc" />
  <path d="M54 40h20M54 46h12" stroke="#070a13" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Success Checkmark (Vigilance) -->
  <path d="M78 26l12 12-22 22" stroke="#1fbc5a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
